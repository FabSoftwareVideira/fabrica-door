services:
  pelican:
    build: .
    container_name: fabrica-prod-door
    ports:
      - "${PORT}:${PORT}"
    env_file:
      - .env
    networks:
      - fabrica-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]  # ✅ porta hardcoded, sem interpolação
      interval: 30s
      timeout: 10s       # ✅ aumentado de 5s para 10s
      retries: 5         # ✅ aumentado de 3 para 5
      start_period: 60s  # ✅ aguarda 60s antes de começar a contar falhas
    restart: unless-stopped

networks:
  fabrica-network:
    external: true
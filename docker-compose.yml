services:
  pelican:
    build: .
    container_name: fabrica-prod-door
    ports:
      - "${PORT}:${PORT}"
    env_file:
      - .env
    networks:
      - fabrica-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:${PORT}/index.html"]
      start_period: 20s
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

networks:
  fabrica-network:
    external: true
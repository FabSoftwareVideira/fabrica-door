services:
  pelican:
    build: .
    container_name: fabrica-prod-door
    ports:
      - "${PORT}:${PORT}"
    env_file:
      - .env
    networks:
      - fabrica-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]  # ✅ porta hardcoded, sem interpolação
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

networks:
  fabrica-network:
    external: true
name: Continuous Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: 🚀 Deploy App
    runs-on: self-hosted

    steps:
      - name: 📂 Checkout do Código
        uses: actions/checkout@v4

      - name: 📝 Criar arquivo .env
        run: |
          # O segredo PROD_ENV_FILE deve conter todo o conteúdo do seu .env
          echo "${{ secrets.PROD_ENV_FILE }}" > .env
          chmod 600 .env

      - name: 🛠️ Validar e Subir Containers
        run: |
          # Carrega as variáveis do .env de forma segura para o shell atual
          set -a
          source .env
          set +a
          
          echo "Validando projeto: $PROJECT_NAME"
          
          # 1. Pull das imagens
          docker compose -f $DOCKER_COMPOSE_FILE pull --quiet
          
          # 2. Sobrevida ao stack (usando as variáveis carregadas)
          docker compose -p $PROJECT_NAME -f $DOCKER_COMPOSE_FILE up -d --remove-orphans --wait

      - name: 📊 Status Final
        run: |
          set -a
          source .env
          set +a
          
          echo "--- Containers do Projeto: $PROJECT_NAME ---"
          docker compose -p $PROJECT_NAME ps
          
          echo "--- Consumo de Recursos ---"
          # Filtra pelo nome do projeto definido no .env
          docker stats --no-stream $(docker ps -q --filter "label=com.docker.compose.project=$PROJECT_NAME")

      - name: 🧹 Limpeza
        if: always()
        run: docker image prune -f
name: Deploy fabrica-door

on:
  push:
    # branches:
    #   - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  deploy:
    name: 🚀 Deploy App
    runs-on: self-hosted
    env:
      CONTAINER_NAME: fabrica-prod-door
      COMPOSE_FILE: docker-compose.prod.yml # Centralizado para facilitar futuras trocas

    steps:
      # ── 1. PREPARAÇÃO ───────────────────────────────────────────────────────
      - name: 📂 Checkout do Código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Definir versão do build
        run: |
          echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          echo "GIT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

      - name: 🔍 Validar Secrets Obrigatórias
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          echo "Verificando secrets..."
          [ -z "$PROD_ENV_FILE" ] && { echo "❌ Secret PROD_ENV_FILE ausente"; exit 1; }
          echo "✅ Secrets presentes."

      - name: 🔐 Montar arquivo .env
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          echo "$PROD_ENV_FILE" > .env
          echo "✅ .env gerado."

      - name: 🛠️ Validar Ambiente e Arquivos
        run: |
          echo "Verificando arquivos críticos..."
          MISSING_FILES=()
          [ ! -f "$COMPOSE_FILE" ] && MISSING_FILES+=("$COMPOSE_FILE")
          [ ! -f .env ]             && MISSING_FILES+=(".env")

          if [ ${#MISSING_FILES[@]} -ne 0 ]; then
            echo "❌ ERRO: Arquivos ausentes: ${MISSING_FILES[*]}"
            exit 1
          fi

          echo "Validando sintaxe do $COMPOSE_FILE..."
          if ! docker compose -f "$COMPOSE_FILE" --env-file .env config -q; then
            echo "❌ ERRO: $COMPOSE_FILE possui erros de sintaxe."
            exit 1
          fi

      # ── 2. EXECUÇÃO ─────────────────────────────────────────────────────────
      - name: 🐳 Atualizar e Subir Containers
        run: |
          echo "Gatilho: ${{ github.ref_name }}"
          echo "Versão: $IMAGE_TAG"
          echo "Commit: $GIT_COMMIT"

          # echo "Puxando imagens novas..."
          # docker compose -f "$COMPOSE_FILE" --env-file .env pull --quiet

          echo "Iniciando serviços com $COMPOSE_FILE..."
          docker compose -f "$COMPOSE_FILE" --env-file .env up -d --build --remove-orphans

      # ── 3. VERIFICAÇÃO PÓS-DEPLOY ────────────────────────────────────────────
      - name: ⏳ Aguardar Estabilização
        run: |
          sleep 10
          UNHEALTHY=$(docker compose -f "$COMPOSE_FILE" ps --format json \
            | grep -E '"State":"(exited|dead|restarting|unhealthy)"' || true)

          if [ -n "$UNHEALTHY" ]; then
            echo "❌ ERRO: Containers em estado inválido."
            docker compose -f "$COMPOSE_FILE" ps
            exit 1
          fi

          if ! docker ps --format '{{.Names}}' | grep -Fxq "$CONTAINER_NAME"; then
            echo "❌ ERRO: Container '$CONTAINER_NAME' não subiu."
            exit 1
          fi

      # ── 4. MANUTENÇÃO ────────────────────────────────────────────────────────
      - name: 🧹 Limpeza Final
        if: always()
        run: |
          docker image prune -f
          rm -f .env
          echo "✅ Deploy finalizado e ambiente limpo."

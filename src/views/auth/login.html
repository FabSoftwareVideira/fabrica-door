{% extends "base.html" %}

{% block title %}Login - {{ SITENAME }}{% endblock %}

{% block content %}
<section class="auth-login-section" aria-labelledby="auth-login-title">
    <div class="container auth-login-container">
        <article class="auth-login-card">
            <h1 id="auth-login-title">Login administrativo</h1>
            <p>Entre com suas credenciais para gerenciar os projetos.</p>

            {% if errorMessage %}
            <div class="auth-login-error" role="alert" aria-live="assertive">
                {{ errorMessage }}
            </div>
            {% endif %}

            <form method="post" action="/auth/login" class="auth-login-form">
                <label for="email">E-mail</label>
                <input id="email" name="email" type="email" required autocomplete="username"
                    value="{{ formEmail or '' }}" placeholder="Digite seu e-mail" autocapitalize="off" autofocus />

                <label for="password">Senha</label>
                <input id="password" name="password" type="password" required autocomplete="current-password"
                    placeholder="Digite sua senha" />

                <button class="btn-primary auth-login-submit" type="submit">Entrar</button>
            </form>
        </article>
    </div>
</section>
{% endblock %}

services:
  app:
    build:
      context: .
      target: production
    container_name: fabrica-prod-door
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    networks:
      - fabrica-network
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://127.0.0.1:${PORT:-8000}/health" ]
      start_period: 20s
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  db:
    image: postgres:18-alpine
    container_name: fabrica-prod-db
    environment:
      PGDATA: /var/lib/postgresql/data
      POSTGRES_DB: ${PGDATABASE:-fabrica_door}
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/migrations:/docker-entrypoint-initdb.d
    networks:
      - fabrica-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres} -d ${PGDATABASE:-fabrica_door}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  fabrica-network:
    external: true

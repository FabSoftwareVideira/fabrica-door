services:
  app:
    build:
      context: .
      target: production
    container_name: fabrica-prod-door
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    networks:
      - fabrica-network
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://127.0.0.1:${PORT:-8000}/health" ]
      start_period: 20s
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

networks:
  fabrica-network:
    external: true
